    <script>
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        let ITEMS = [];
        let state = [];
        let DOC = {};
        const AREAS = ['branco', 'azul', 'verde', 'rosa'];

        lucide.createIcons();

        async function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const statusLabel = document.getElementById("status");
            statusLabel.innerText = "Lendo arquivo...";
            
            const reader = new FileReader();

            if (file.type === "application/pdf") {
                reader.onload = async function() {
                    try {
                        const typedarray = new Uint8Array(this.result);
                        const loadingTask = pdfjs.getDocument({ data: typedarray, verbosity: 0 });
                        const pdf = await loadingTask.promise;
                        let fullText = "";
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            fullText += textContent.items.map(it => it.str).join("  ") + "\n";
                        }
                        processText(fullText);
                    } catch (err) {
                        statusLabel.innerText = "Erro ao abrir PDF.";
                    }
                };
                reader.readAsArrayBuffer(file);
            } 
            else {
                reader.onload = async function(event) {
                    try {
                        const arrayBuffer = event.target.result;
                        const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                        processText(result.value);
                    } catch (err) {
                        statusLabel.innerText = "Erro ao ler Word.";
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function cleanObs(text, fieldName) {
            if (!text) return "";
            let cleaned = text.replace(new RegExp(fieldName + "[:.]*", "i"), "").replace(/SEPARADO POR:.*$/i, "").trim();
            cleaned = cleaned.split(/(?:DETALHES DA VENDA|CONDIÇÃO DE PAGAMENTO|REFERENCIA|CONTATO NA ENTREGA|FINALIDADE|SEPARADO POR)/i)[0];
            return cleaned.trim();
        }

function processText(text) {
    const docMatch = text.match(/DOC\s*[:\s]*\s*([A-Z0-9]+)/i);
    DOC.numDoc = docMatch ? docMatch[1].trim() : '---';
    DOC.emissao = text.match(/Emissão:\s*(\d{2}\/\d{2}\/\d{4})/i)?.[1] || '---';

    // ✅ DATA DE ENTREGA: filtra 31/12/9999, pega a última data real
    const allDates = text.match(/\d{2}\/\d{2}\/\d{4}/g);
    const realDates = allDates ? allDates.filter(d => d !== '31/12/9999' && d !== DOC.emissao) : [];
    DOC.entrega = realDates.length > 0 ? realDates[realDates.length - 1] : '---';

    // ✅ VENDEDOR: tenta formato PDF (3+ espaços), fallback Word (quebra de linha)
    let vMatch = text.match(/VENDEDOR[.:\s]+(.+?)\s{3,}/i);
    if (!vMatch) {
        vMatch = text.match(/VENDEDOR[.:\s]+(.+?)(?:\n|Página|CLIENTE|$)/i);
    }
    DOC.vendedor = vMatch ? vMatch[1].trim() : '---';

    const clienteMatch = text.match(/(?:CLIENTE\s+)?([\d.-]+\s*-\s*[A-Z\s]+)(?:\t|\(|\n|$)/i);
    DOC.cliente = clienteMatch ? clienteMatch[1].trim() : 'Não Identificado';
    DOC.contato = text.match(/(\(\d{2}\)\s?\d{4,5}-\d{4})/)?.[0] || '';

    const rua = text.match(/Entrega:\.\s*(.*?)(?:Bairro|CEP|Cidade|-|$)/i)?.[1]?.trim() || '';
    const bairro = text.match(/Bairro:\.\s*(.*?)(?:CEP|Cidade|-|$)/i)?.[1]?.trim() || '';
    const cidade = text.match(/Cidade:\.\s*([A-Z\s]+?)(?:\s|-|\n|$)/i)?.[1]?.trim() || '';
    DOC.enderecoCompleto = `${rua}${bairro ? ' - ' + bairro : ''}${cidade ? ' - ' + cidade : ''}`;

    ITEMS = [];

    function addItem(cod, desc, un, qtd, med) {
        const descLimpa = desc
            .replace(/\s+/g, ' ')
            .replace(/VENDEDOR[\s\S]*?CLIENTE/i, '')
            .trim();
        const chave = `${cod}|${descLimpa}|${un}|${qtd}|${med}`;
        if (!ITEMS.some(item => `${item.cod}|${item.desc}|${item.un}|${item.qtd}|${item.med}` === chave)) {
            ITEMS.push({ cod, desc: descLimpa, un, qtd, med });
        }
    }

    // ── WORD: CSV ──
    const csvRegex = /"(\d{4,})\s*"\s*,\s*"([\s\S]*?)"\s*,\s*"(UN|ML|M2|PC|KG)\s*"\s*,\s*"(\d+,\d+|\d+)\s*"\s*,\s*"(\d+,\d+|\d+)\s*"/gi;
    let match;
    while ((match = csvRegex.exec(text)) !== null) {
        addItem(match[1].trim(), match[2].trim(), match[3].toUpperCase(), match[4], match[5]);
    }

    // ── WORD: código 5 dígitos em linhas separadas ──
    const wordItemRegex = /(\d{5})\s*\n\s*([\s\S]+?)\n\s*(UN|ML|M2|PC|KG)\s+(\d+,\d+|\d+)\s+(\d+,\d+|\d+)/gi;
    while ((match = wordItemRegex.exec(text)) !== null) {
        addItem(match[1].trim(), match[2], match[3].toUpperCase(), match[4], match[5]);
    }

    // ── PDF: tudo na mesma linha ──
    if (ITEMS.length === 0) {
        const tableStart = text.search(/Código\s+Descrição\s+Qtd\s+Un/i);
        const tableText = tableStart !== -1 ? text.substring(tableStart) : text;
        const itemRegex = /(\d{5})\s+(\d+,\d+|\d+)\s+(\d+,\d+|\d+)\s{2,}(UN|ML|M2|PC|KG)/gi;
        let matchItem;
        let prevEnd = 0;
        while ((matchItem = itemRegex.exec(tableText)) !== null) {
            let desc = tableText.substring(prevEnd, matchItem.index).trim();
            desc = desc.replace(/Código\s+Descrição\s+Qtd\s+Un\s*/i, '').trim();
            if (desc) {
                addItem(matchItem[1].trim(), desc, matchItem[4].toUpperCase(), matchItem[2], matchItem[3]);
            }
            prevEnd = matchItem.index + matchItem[0].length;
        }
    }

    if (ITEMS.length === 0) {
        document.getElementById("status").innerText = "Nenhum item detectado.";
        return;
    }

    // ✅ OBS: usa a ÚLTIMA ocorrência de DATA DE ENTREGA no texto
    let obsText = text;
    const lastIdx = text.lastIndexOf('DATA DE ENTREGA');
    if (lastIdx !== -1) {
        obsText = text.substring(lastIdx);
    }
       const obsMatch = obsText.match(/(DATA\s*DE\s*ENTREGA[.:\s]*[\s\S]*?FINALIDADE[.:\s]*.*)/i);
    if (obsMatch) {
        let obs = obsMatch[1];

        if (!/\n/.test(obs)) {
            // PDF: tudo na mesma linha
            // 1. Normaliza espaços múltiplos para um espaço só
            obs = obs.replace(/\s+/g, ' ');
            // 2. Insere <br> antes de cada campo conhecido (preserva TODO o conteúdo)
            obs = obs
                .replace(/(DATA\s+DE\s+ENTREGA)/gi, '<br>$1')
                .replace(/(DETALHES\s+DA\s+VENDA)/gi, '<br>$1')
                .replace(/(SEPARADO\s+POR)/gi, '<br>$1')
                .replace(/(CONDIÇÃO\s+DE\s+PAGAMENTO)/gi, '<br>$1')
                .replace(/(LEVAR\s+MAQUININHA)/gi, '<br>$1')
                .replace(/(CONTATO\s+NA\s+ENTREGA)/gi, '<br>$1')
                .replace(/(REFERENCIA)/gi, '<br>$1')
                .replace(/(FINALIDADE)/gi, '<br>$1');
            // 3. Remove <br> do início e espaços extras
            obs = obs.replace(/^(<br>\s*)+/, '').trim();
        } else {
            // Word: já tem quebras de linha
            obs = obs
                .replace(/\n+/g, "<br>")
                .replace(/(DATA\s*DE\s*ENTREGA[.:\s]*)<br>\s*/i, "$1")
                .replace(/TRONCO AVARÉ[\s\S]*?DOC\s*:[\s\S]*?\d+/gi, "")
                .replace(/Página\s*\d+\/\d+/gi, "")
                .replace(/Data da Emissão:[^<]*/gi, "")
                .replace(/<br>\s*\d{4,}\s*<br>/g, "<br>")
                .replace(/<br>.*?(CEDRINHO|MADEIRA|BEIRAL|PORTA|JANELA).*?<br>/gi, "<br>")
                .replace(/<br>\s*(UN|ML|M2|PC|KG)\s+\d+,\d+\s+\d+,\d+.*?<br>/gi, "<br>")
                .replace(/FF\s*-\s*\//gi, "")
                .replace(
                    /(DETALHES\s*DA\s*VENDA[.:\s]*)([\s\S]*?)(SEPARADO\s*POR[.:\s]*)/i,
                    (m, inicio, meio, separado) => `${inicio}${meio.trim()} &nbsp;&nbsp;|&nbsp;&nbsp; ${separado}`
                )
                .replace(/\s{2,}/g, " ")
                .replace(/(<br>\s*){2,}/g, "<br>")
                .trim();
        }
        DOC.obsGeral = obs;
    } else {
        DOC.obsGeral = "";
    }

    state = ITEMS.map(() => new Set());
    updateUI();
}



        function updateUI() {
            document.getElementById("clientInfo").classList.remove('hidden');
            document.getElementById("actions").classList.remove('hidden');
            
            document.getElementById("disp-doc").innerText = DOC.numDoc;
            document.getElementById("disp-cliente").innerText = DOC.cliente;
            document.getElementById("disp-endereco").innerText = DOC.enderecoCompleto;
            document.getElementById("disp-tel").innerText = DOC.contato;
            document.getElementById("disp-emissao").innerText = DOC.emissao;
            document.getElementById("disp-entrega-data").innerText = DOC.entrega;
	    document.getElementById("disp-vendedor").innerText = DOC.vendedor;
            
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = "";
            
            ITEMS.forEach((item, i) => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-slate-700/40 transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-4 font-mono text-sm text-slate-400">${item.cod}</td>
                    <td class="px-6 py-4 text-sm font-medium">${item.desc}</td>
                    <td class="px-4 py-4 text-xs font-bold text-slate-500">${item.un}</td>
                    <td class="px-4 py-4 text-sm font-bold text-blue-400">${item.qtd}</td>
                    <td class="px-4 py-4 text-sm font-bold text-orange-400">${item.med || '-'}</td>
                    ${AREAS.map(a => `
                        <td class="px-4 py-4 text-center border-l border-slate-700/50">
                            <input type="checkbox" class="w-5 h-5 accent-blue-500 cursor-pointer" onchange="toggle(${i},'${a}',this.checked)">
                        </td>
                    `).join("")}
                `;
                tbody.appendChild(tr);
            });
            
            document.getElementById("status").innerText = `${ITEMS.length} itens encontrados!`;
            lucide.createIcons();
        }

        function toggle(i, area, val) {
            if (val) state[i].add(area);
            else state[i].delete(area);
        }

function toggleAll(area, value) {
    ITEMS.forEach((_, i) => {
        const checkbox = document.querySelectorAll("tbody tr")[i]
            ?.querySelector(`input[onchange*="'${area}'"]`);

        if (checkbox) {
            checkbox.checked = value;

            if (value) state[i].add(area);
            else state[i].delete(area);
        }
    });
}

        function printArea(area) {
            const items = ITEMS.filter((_, i) => state[i].has(area));
            if (items.length === 0) {
                alert("Selecione os itens para esta ficha primeiro.");
                return;
            }

            const styles = {
                branco: { color: '#000', label: 'BRANCA', border: '#cbd5e1' },
                azul: { color: '#1e40af', label: 'AZUL', border: '#3b82f6' },
                verde: { color: '#065f46', label: 'VERDE', border: '#10b981' },
                rosa: { color: '#9d174d', label: 'ROSA', border: '#f472b6' }
            };

            const s = styles[area];
            const ITEMS_PER_PAGE = 12; 
            const pages = [];
            for (let i = 0; i < items.length; i += ITEMS_PER_PAGE) {
                pages.push(items.slice(i, i + ITEMS_PER_PAGE));
            }

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`

			.brand { margin-left: 15px;}

    font-size: 11px;

}

                        .ficha-side { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
                        .ficha-tag { 
                            background: ${s.border}; 
                            color: ${area === 'branco' ? '#000' : '#fff'}; 
                            padding: 4px 8px;

                        }

    margin-top: 10px;
